<style>
/* ═══ 首页专属：全屏入场 ═══ */
body.home-body {
  overflow: hidden;
  background: var(--bg, #FFFEFA);
  opacity: 1;
  animation: none;
}

/* ── IP 形象：始终居中 ── */
#ip-wrapper {
  position: fixed;
  z-index: 110;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  /* pointer-events 处理拖动，不用 touch-action:none 全局锁滚 */
  user-select: none;
  -webkit-user-select: none;
  transition: left 0.8s cubic-bezier(.4,0,.2,1),
              top  0.8s cubic-bezier(.4,0,.2,1),
              transform 0.8s cubic-bezier(.4,0,.2,1);
}
#ip-wrapper.dragging  { transition: none; }
#ip-wrapper.settled   { transition: none; }
#ip-wrapper.entering {
  transition: none;
  transform-origin: top left;
  filter: drop-shadow(0 14px 34px rgba(0,0,0,0.14));
}

#ip-img {
  display: block;
  width: 240px;
  height: auto;
  animation: breathe 5s ease-in-out infinite;
  transform-origin: bottom center;
  cursor: grab;
  filter: drop-shadow(0 8px 32px rgba(0,0,0,0.12));
  -webkit-user-drag: none;
  /* 移动端关掉默认 touch 行为，在 JS 里手动控制 */
  touch-action: none;
}
#ip-img.dragging-img {
  cursor: grabbing;
  animation: none;
}

@keyframes breathe {
  0%, 100% { transform: scale(1) translateY(0); }
  50%       { transform: scale(1.015) translateY(-6px); }
}

/* ── 打字机文字层：从 IP 头顶上方开始生成 ── */
#typewriter-lines {
  position: fixed;
  inset: 0;
  z-index: 105;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  pointer-events: none;
  padding: var(--tw-padding-top, clamp(56px, 8.5vh, 96px)) 24px var(--tw-padding-bottom, 48px);
  transition: opacity 0.4s ease, filter 0.45s ease, transform 0.5s cubic-bezier(.16,1,.3,1);
}

.tw-line {
  font-family: "Noto Serif SC", "PingFang SC", serif;
  /* 字号由 JS 动态设置，不用 CSS 计算 */
  font-size: var(--tw-font-size, 1rem);
  color: var(--ink, #1A1A1A);
  letter-spacing: 0.06em;
  opacity: 0;
  line-height: 1.85;
  white-space: nowrap;
  transform: translateX(var(--scatter-x, 0));
  transition: opacity 0.3s ease, transform 0.7s cubic-bezier(.16,1,.3,1);
  text-align: center;
}
.tw-line.visible { opacity: 1; }
.tw-line.dim     { opacity: 0.18; }
.tw-line.departing {
  opacity: 0;
  transform: translateX(var(--scatter-x, 0)) translateY(-8px);
}
/* 关键行高亮 */
.tw-line.highlight {
  color: var(--accent, #3F51B5);
  font-weight: 500;
  opacity: 1;
}

body.entering-records #typewriter-lines {
  opacity: 0;
  filter: blur(1px);
  transform: translateY(-18px);
}

body.entering-records #bottom-actions,
body.entering-records #skip-btn {
  opacity: 0;
  pointer-events: none;
}

#archive-preview {
  position: fixed;
  left: 50%;
  top: 48%;
  z-index: 90;
  width: min(720px, calc(100vw - 80px));
  min-height: 320px;
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, calc(-50% + 24px));
  /* 延迟起步，让打字机文字先退场，避免两层内容叠字 */
  transition: opacity 0.7s cubic-bezier(.16,1,.3,1) 0.18s,
              transform 0.7s cubic-bezier(.16,1,.3,1) 0.18s;
}
#archive-preview .file-tag {
  margin-bottom: 24px;
  text-align: center;
}
.journey-preview {
  position: relative;
  height: 260px;
  overflow: visible;
}
.journey-cloud {
  position: absolute;
  left: 50%;
  top: 0;
  width: 230px;
  transform: translateX(-50%);
  opacity: 0;
  filter: saturate(0.9);
  transition: opacity 0.8s ease 0.2s, transform 1.2s cubic-bezier(.16,1,.3,1) 0.2s;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}
.journey-line {
  position: absolute;
  left: 0;
  right: 0;
  top: 132px;
  height: 80px;
  opacity: 0;
  transition: opacity 0.6s ease 0.34s;
}
.journey-line path {
  fill: none;
  stroke: rgba(26,26,26,0.16);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 780;
  stroke-dashoffset: 780;
  transition: stroke-dashoffset 1.05s linear 0.4s;
}
.journey-chip {
  position: absolute;
  border: 1px solid color-mix(in srgb, var(--chip-color, var(--accent)) 42%, transparent);
  border-radius: 6px;
  background: rgba(255,254,250,0.86);
  padding: 5px 12px;
  font-family: "Noto Serif SC", serif;
  font-size: 0.84rem;
  color: var(--ink);
  white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  opacity: 0;
  transform: translateY(10px) rotate(var(--chip-rot, -1deg));
  transition: opacity 0.52s ease, transform 0.72s cubic-bezier(.16,1,.3,1);
}
.journey-chip:nth-of-type(1) { left: 6%;  top: 82px;  --chip-color: #3F51B5; --chip-rot: -1.5deg; }
.journey-chip:nth-of-type(2) { left: 12%; top: 198px; --chip-color: #FF7A59; --chip-rot: 1.2deg; }
.journey-chip:nth-of-type(3) { right: 9%; top: 78px;  --chip-color: #C2185B; --chip-rot: 1.5deg; }
.journey-chip:nth-of-type(4) { right: 7%; top: 196px; --chip-color: #5C9E3D; --chip-rot: -1deg; }
body.entering-records #archive-preview {
  opacity: 1;
  transform: translate(-50%, -50%);
}
body.entering-records .journey-cloud {
  opacity: 0.68;
  transform: translateX(-50%) translateY(-8px);
}
body.entering-records .journey-line {
  opacity: 1;
}
body.entering-records .journey-line path {
  stroke-dashoffset: 0;
}
body.entering-records .journey-chip {
  opacity: 1;
  transform: translateY(0) rotate(var(--chip-rot, -1deg));
}
body.entering-records .journey-chip:nth-of-type(1) { transition-delay: 0.24s; }
body.entering-records .journey-chip:nth-of-type(2) { transition-delay: 0.36s; }
body.entering-records .journey-chip:nth-of-type(3) { transition-delay: 0.48s; }
body.entering-records .journey-chip:nth-of-type(4) { transition-delay: 0.6s; }
body.archive-ready #archive-preview {
  pointer-events: auto;
}

/* 光标 */
.tw-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent, #3F51B5);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* ── 跳过按钮 ── */
#skip-btn {
  position: fixed;
  bottom: 36px;
  right: 48px;
  z-index: 200;
  font-family: "Noto Serif SC", serif;
  font-size: 0.82rem;
  opacity: 0.35;
  border: 1px solid currentColor;
  border-radius: 999px;
  padding: 6px 18px;
  background: transparent;
  color: inherit;
  cursor: pointer;
  transition: opacity 0.2s ease;
}
#skip-btn:hover { opacity: 0.85; }

/* ── 底部操作区：进入 + 提示 纵向排列，不互相遮挡 ── */
#bottom-actions {
  position: fixed;
  bottom: clamp(72px, 9vh, 104px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  pointer-events: auto;
}

#drag-hint {
  font-family: "Noto Serif SC", serif;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--accent, #3F51B5);
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.6s ease;
}
#drag-hint.show { opacity: 0.65; }

#enter-btn {
  font-family: "Noto Serif SC", serif;
  font-size: 0.88rem;
  letter-spacing: 0.1em;
  border: 1.5px solid var(--ink, #1A1A1A);
  border-radius: 999px;
  padding: 8px 28px;
  background: transparent;
  color: inherit;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease, background-color 0.2s ease, color 0.2s ease;
}
#enter-btn.show {
  opacity: 1;
  pointer-events: auto;
}
#enter-btn:hover {
  background: var(--ink, #1A1A1A);
  color: var(--bg, #FFFEFA);
}

/* ── 入场完成后 ── */
body.intro-done { overflow: auto; }
.page-shell {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease 0.2s;
}
body.intro-done .page-shell {
  opacity: 1;
  pointer-events: auto;
}

/* ── 移动端：同等体验，为小屏幕重新设计── */
@media (max-width: 600px) {
  #ip-wrapper {
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  #ip-img { width: 150px; }
  #typewriter-lines {
    padding-top: var(--tw-padding-top, clamp(64px, 11vh, 96px));
    padding-bottom: var(--tw-padding-bottom, 120px);
  }
  .tw-line {
    font-size: var(--tw-font-size, 0.82rem);
    letter-spacing: 0.03em;
  }
  #bottom-actions { bottom: 48px; gap: 10px; }
  #enter-btn, #skip-btn { font-size: 0.76rem; padding: 6px 20px; }
  #drag-hint { font-size: 0.74rem; }
  #archive-preview {
    top: 46%;
    width: calc(100vw - 36px);
    min-height: 360px;
  }
  #archive-preview .file-tag {
    margin-bottom: 16px;
  }
  .journey-preview { height: 300px; }
  .journey-cloud { width: 180px; top: 6px; }
  .journey-line { top: 138px; }
  .journey-chip { font-size: 0.78rem; padding: 5px 10px; }
  .journey-chip:nth-of-type(1) { left: 2%;  top: 88px; }
  .journey-chip:nth-of-type(2) { left: 5%;  top: 222px; }
  .journey-chip:nth-of-type(3) { right: 2%; top: 92px; }
  .journey-chip:nth-of-type(4) { right: 2%; top: 224px; }
}
</style>

<script>
(function () {
  /* ── 文案 ── */
  const LINES = [
    "[ 系统正在初始化… ]",
    "",
    "你好，旅行者。",
    "检测到未知访客 ——",
    "正在加载存在体档案",
    "",
    "代号 / SERENA_熙冉",
    "属性 / 研究者 · 创造者 · 游荡者",
    "已知特征 / 喜欢把想法变成真实的东西",
    "已知危险 / 不按常理出牌",
    "",
    "警告：接触后可能出现以下症状——",
    "持续思考 · 不受控制的表达欲",
    "对这个世界的过度热情",
    "",
    "规则如下 ——",
    "第一条：没有规则。",
    "第二条：参见第一条。",
    "",
    "[ 档案加载完毕 ]",
    "欢迎，或者，后悔都来不及了。",
  ];

  const CHAR_DELAY  = 46;
  const LINE_PAUSE  = 160;
  const EMPTY_PAUSE = 300;
  const DIM_DELAY   = 500;

  /* ── DOM ── */
  const ipWrapper = document.getElementById('ip-wrapper');
  const ipImg     = document.getElementById('ip-img');
  const linesEl   = document.getElementById('typewriter-lines');
  const skipBtn   = document.getElementById('skip-btn');
  const bottomActions = document.getElementById('bottom-actions');
  const dragHint  = document.getElementById('drag-hint');
  const enterBtn  = document.getElementById('enter-btn');

  /* ── 打字机 ── */
  let lineEls  = [];
  let cursorEl = null;
  let twDone   = false;
  let twAbort  = false;

  // 关键行索引（高亮显示蓝色）
  const HIGHLIGHT_LINES = new Set([6, 7, 8, 9, 15, 16]); // 代号/属性/规则行

  function createLines() {
    LINES.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'tw-line';
      if (HIGHLIGHT_LINES.has(i)) div.classList.add('highlight');
      div.style.setProperty('--scatter-x', (i % 2 === 0 ? '-1' : '1') + 'px');
      if (text === '') div.innerHTML = '&nbsp;';
      linesEl.appendChild(div);
      lineEls.push(div);
    });
  }

  function typewriteLine(idx, onDone) {
    const el   = lineEls[idx];
    const text = LINES[idx];
    el.classList.add('visible');

    if (text === '') { setTimeout(onDone, EMPTY_PAUSE); return; }

    if (!cursorEl) {
      cursorEl = document.createElement('span');
      cursorEl.className = 'tw-cursor';
    }
    el.innerHTML = '';
    el.appendChild(cursorEl);

    let i = 0;
    function next() {
      if (twAbort) return;
      if (i >= text.length) { setTimeout(onDone, LINE_PAUSE); return; }
      const s = document.createElement('span');
      s.textContent = text[i++];
      el.insertBefore(s, cursorEl);
      setTimeout(next, CHAR_DELAY);
    }
    next();
  }

  async function runTypewriter() {
    createLines();
    for (let i = 0; i < LINES.length; i++) {
      if (twAbort) break;
      if (i > 0) {
        setTimeout((idx => () => {
          for (let j = 0; j < idx; j++) {
            // highlight 行只降透明度，不改颜色
            if (!lineEls[j].classList.contains('highlight')) {
              lineEls[j].classList.add('dim');
            } else {
              lineEls[j].style.opacity = '0.3';
            }
          }
        })(i), DIM_DELAY);
      }
      await new Promise(r => typewriteLine(i, r));
    }
    if (!twAbort) finishTypewriter();
  }

  function finishTypewriter() {
    if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
    twDone = true;
    skipBtn.style.display = 'none';
    setTimeout(() => {
      dragHint.classList.add('show');
      enterBtn.classList.add('show');
    }, 400);
  }

  /* ── 跳过 ── */
  skipBtn.addEventListener('click', () => {
    twAbort = true;
    // 立即显示所有行文字
    lineEls.forEach((el, i) => {
      el.classList.add('visible');
      if (i < lineEls.length - 1) el.classList.add('dim');
      if (LINES[i]) el.textContent = LINES[i];
    });
    finishTypewriter();
  });


  /* works 页已经是云层观测场：把（可能被拖离的）IP 收回画面中心，
     让她像站在入口处目送信号展开；移动端终点页隐藏主 IP，因此这里只做轻微收束。 */
  function moveIpTowardRecords() {
    const rect = ipWrapper.getBoundingClientRect();
    const isMobile = window.innerWidth <= 600;
    const scale = isMobile ? 0.76 : 1;
    const startX = rect.left;
    const startY = rect.top;
    const targetX = (window.innerWidth - rect.width * scale) / 2;
    const targetY = (window.innerHeight - rect.height * scale) / 2;
    const duration = 1120;
    const startedAt = performance.now();

    ipWrapper.classList.remove('settled', 'dragging');
    ipWrapper.classList.add('entering');
    ipWrapper.style.setProperty('left', startX + 'px', 'important');
    ipWrapper.style.setProperty('top', startY + 'px', 'important');
    ipWrapper.style.setProperty('transform', 'scale(1)', 'important');

    function easeOutQuint(t) { return 1 - Math.pow(1 - t, 5); }
    function tick(now) {
      const t = Math.min(1, (now - startedAt) / duration);
      const eased = easeOutQuint(t);
      const x = startX + (targetX - startX) * eased;
      const y = startY + (targetY - startY) * eased;
      const currentScale = 1 + (scale - 1) * eased;
      ipWrapper.style.setProperty('left', x + 'px', 'important');
      ipWrapper.style.setProperty('top', y + 'px', 'important');
      ipWrapper.style.setProperty('transform', 'scale(' + currentScale + ')', 'important');
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ── 进入网站 ── */
  function enterSite() {
    document.body.classList.add('entering-records');
    enterBtn.classList.remove('show');
    dragHint.classList.remove('show');
    skipBtn.style.display = 'none';
    linesEl.style.setProperty('opacity', '0', 'important');
    linesEl.style.setProperty('filter', 'blur(1px)', 'important');
    linesEl.style.setProperty('transform', 'translateY(-18px)', 'important');
    moveIpTowardRecords();

    lineEls.forEach((el, i) => {
      const direction = i % 2 === 0 ? -1 : 1;
      el.style.setProperty('--scatter-x', (direction * (18 + (i % 4) * 6)) + 'px');
      el.classList.add('departing');
    });

    setTimeout(() => {
      linesEl.style.display = 'none';
      sessionStorage.setItem('serena-entering-works', '1');
      window.location.href = 'works.html';
    }, 1450);
  }

  enterBtn.addEventListener('click', enterSite);

  /* ── 拖动 IP ── */
  // 在 ip-img 上用 pointermove 替代 touchmove，防止 iOS Safari passive 问题
  let dragging = false, dragOffX = 0, dragOffY = 0;

  function onDragStart(e) {
    // 先读 rect（此时 transform 还在），再清 transform，避免第一帧跳变
    const rect = ipWrapper.getBoundingClientRect();
    // 把 transform 换算成等价的 left/top，保证位置不动
    ipWrapper.style.left      = rect.left + 'px';
    ipWrapper.style.top       = rect.top  + 'px';
    ipWrapper.style.transform = 'none';

    dragging = true;
    ipImg.classList.add('dragging-img');
    ipWrapper.classList.add('dragging', 'settled');

    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    dragOffX = cx - rect.left;
    dragOffY = cy - rect.top;
    e.preventDefault();
  }
  function onDragMove(e) {
    if (!dragging) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    ipWrapper.style.left = (cx - dragOffX) + 'px';
    ipWrapper.style.top  = (cy - dragOffY) + 'px';
  }
  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    ipImg.classList.remove('dragging-img');
    ipWrapper.classList.remove('dragging');
  }

  ipImg.addEventListener('mousedown',  onDragStart);
  ipImg.addEventListener('touchstart', onDragStart, { passive: false });
  document.addEventListener('mousemove',  onDragMove);
  // document 级 touchmove 必须 passive:false 才能 preventDefault
  document.addEventListener('touchmove',  onDragMove, { passive: false });
  document.addEventListener('mouseup',    onDragEnd);
  document.addEventListener('touchend',   onDragEnd);

  function getSafeBottom() {
    const probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;bottom:0;height:env(safe-area-inset-bottom);visibility:hidden;pointer-events:none;';
    document.body.appendChild(probe);
    const height = probe.getBoundingClientRect().height;
    probe.remove();
    return height || 0;
  }

  /* ── 动态字号：用 JS 读真实可用高度，三浏览器一致 ── */
  function setFontSize() {
    const vh = window.innerHeight;
    const totalLines = LINES.length; // 21行
    const lineHeight = 1.85;
    const isMobile = window.innerWidth <= 600;
    const actionsRect = bottomActions.getBoundingClientRect();
    const safeBottom = getSafeBottom();
    const topPadding = isMobile ? Math.min(96, Math.max(48, vh * 0.09)) : Math.min(96, Math.max(56, vh * 0.085));
    const bottomPadding = isMobile ? Math.max(108, actionsRect.height + 42 + safeBottom) : Math.max(148, actionsRect.height + 110 + safeBottom);
    const available = vh - topPadding - bottomPadding;
    const computed = available / totalLines / lineHeight;
    const minSize = isMobile ? 10.5 : 13;
    const maxSize = isMobile ? 14 : 17;
    const size = Math.min(maxSize, Math.max(minSize, computed));
    document.documentElement.style.setProperty('--tw-font-size', size + 'px');
    document.documentElement.style.setProperty('--tw-padding-top', topPadding + 'px');
    document.documentElement.style.setProperty('--tw-padding-bottom', bottomPadding + 'px');
  }
  setFontSize();
  window.addEventListener('resize', setFontSize);

  /* ── 启动 ── */
  runTypewriter();
})();
</script>
</body>
</html>
