/* ══ IP 形象（居中，可拖动）══

  transform-origin: bottom center;
  -webkit-user-drag: none;
}
#ip-works.dragging { cursor: grabbing; animation: none; }
@keyframes breathe {
  0%,100% { transform: scale(1) translateY(0); }
  50%      { transform: scale(1.015) translateY(-5px); }

/* ══ 列车车厢场景：白天观察车厢 ══ */

.train-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(63, 81, 181, 0.018) 3px,
      rgba(63, 81, 181, 0.018) 4px

    var(--bg);
}

/* 观测信号层：心电式信号线被一笔一笔"画"出来，画完停留后淡出，
   隔一会儿换个高度、换个波形重来——若隐若现的背景呼吸，不与角色抢戏 */
.scene-signal {
  position: absolute;
  left: 0;
  right: 0;
  top: 40%;
  height: 200px;
  z-index: 1;
  pointer-events: none;
  transition: opacity 1.2s ease;
}
.scene-signal.fade { opacity: 0; }
.signal-line {
  fill: none;
  stroke: rgba(26,26,26,0.16);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.signal-spark {
  fill: rgba(26,26,26,0.20);
  opacity: 0;
  transition: opacity 0.9s ease;
}
.signal-spark.show { opacity: 1; }

/* 云：手绘铅笔插画（透明底 PNG，和角色同一支笔）。
   pudding 式持续横穿：从屏右缓慢飘到屏左循环，负 delay 错开各自初始位置 */
.scene-cloud {
  position: absolute;
  left: 0;
  width: var(--cw, 200px);
  z-index: 1;
  opacity: 0.72;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;

}

  .scene-cloud {
    left: var(--cx, 50%);

}

<script>
(function () {
  /* ── 窗口 z-index 管理 ── */
  let topZ = 300;
  function bringToFront(win) {
    win.style.zIndex = ++topZ;
  }

  function loadCaseFrame(win) {
    const frame = win.querySelector('.case-frame[data-src]');
    if (!frame || frame.src) return;
    frame.src = frame.dataset.src;
  }

  /* ── 打开窗口 ── */
  const openWindows = new Set();

  // 初始位置：错开排列
  const offsets = [
    { x: 54,  y: 62  },
    { x: 92,  y: 96  },
    { x: 130, y: 130 },
    { x: 168, y: 164 },
    { x: 74,  y: 198 },
    { x: 112, y: 232 },
  ];
  let openCount = 0;

  function openCaseWindow(id) {
    const win = document.getElementById('win-' + id);
    if (!win) return;

    if (openWindows.has(id)) {
      loadCaseFrame(win);
      bringToFront(win);
      return;
    }

    // 像浏览器标签页/桌面窗口一样逐个错开，同时保留足够宽度让嵌入页维持独立页的左右布局。
    const off = offsets[openCount % offsets.length];
    const step = Math.floor(openCount / offsets.length) * 18;
    const winWidth = win.classList.contains('detail-window')
      ? Math.min(980, window.innerWidth - 40)
      : Math.min(480, window.innerWidth - 32);
    const bodyHeight = win.classList.contains('detail-window')
      ? Math.min(window.innerHeight * 0.68, 620)
      : Math.min(window.innerHeight * 0.6, 520);
    const winHeight = bodyHeight + 52;
    const maxLeft = Math.max(12, window.innerWidth - winWidth - 12);
    const maxTop = Math.max(12, window.innerHeight - winHeight - 86);
    win.style.left = Math.min(maxLeft, off.x + step) + 'px';
    win.style.top  = Math.min(maxTop, off.y + step) + 'px';
    openCount++;

    win.classList.add('open');
    openWindows.add(id);
    loadCaseFrame(win);
    bringToFront(win);

    // 重播扫描线
    const scan = win.querySelector('.win-scan');
    if (scan) {
      scan.style.animation = 'none';
      requestAnimationFrame(() => {
        scan.style.animation = '';
      });
    }
  }

  /* ── 关闭按钮 ── */
  document.querySelectorAll('.win-dot-close').forEach(function (dot) {
    dot.addEventListener('click', function (e) {
      e.stopPropagation();
      const id = dot.dataset.close;
      const win = document.getElementById(id);
      if (win) {
        win.classList.remove('open');
        openWindows.delete(id.replace('win-', ''));
      }
    });
  });

  /* ── 窗口拖动 ── */
  document.querySelectorAll('.win-titlebar').forEach(function (bar) {
    const win = bar.closest('.case-window');
    let dragging = false, offX = 0, offY = 0;

    function startDrag(e) {
      if (e.target.classList.contains('win-dot') ||
          e.target.classList.contains('win-newtab')) return;
      bringToFront(win);
      dragging = true;
      bar.classList.add('dragging');
      const rect = win.getBoundingClientRect();
      win.style.left = rect.left + 'px';
      win.style.top  = rect.top  + 'px';
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      offX = cx - rect.left;
      offY = cy - rect.top;
      e.preventDefault();
    }
    function moveDrag(e) {
      if (!dragging) return;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      // 边界限制：不让标题栏趾出视口
      const minY = 0;
      const maxY = window.innerHeight - 44; // 至少保留标题栏高度
      const minX = -(win.offsetWidth - 80); // 至少保留 80px 在屏内
      const maxX = window.innerWidth - 80;
      const newLeft = Math.min(maxX, Math.max(minX, cx - offX));
      const newTop  = Math.min(maxY, Math.max(minY, cy - offY));
      win.style.left = newLeft + 'px';
      win.style.top  = newTop  + 'px';
      e.preventDefault();
    }
    function endDrag() {
      dragging = false;
      bar.classList.remove('dragging');
    }

    bar.addEventListener('mousedown',  startDrag);
    bar.addEventListener('touchstart', startDrag, { passive: false });
    document.addEventListener('mousemove',  moveDrag);
    document.addEventListener('touchmove',  moveDrag, { passive: false });
    document.addEventListener('mouseup',  endDrag);
    document.addEventListener('touchend', endDrag);
  });

  /* ── 点击窗口体带到前面 ── */
  document.querySelectorAll('.case-window').forEach(function (win) {
    win.addEventListener('mousedown', function () { bringToFront(win); });
    win.addEventListener('touchstart', function () { bringToFront(win); }, { passive: true });
  });

  /* ── IP 形象拖动 ── */
  const ip = document.getElementById('ip-works');
  let ipDragging = false, ipOffX = 0, ipOffY = 0;

  function ipStart(e) {
    const rect = ip.getBoundingClientRect();
    ip.style.right  = 'auto';
    ip.style.bottom = 'auto';
    ip.style.left = rect.left + 'px';
    ip.style.top  = rect.top  + 'px';
    ip.style.transform = 'none';

    ipDragging = true;
    ip.classList.add('dragging');
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    ipOffX = cx - rect.left;
    ipOffY = cy - rect.top;
    e.preventDefault();
  }
  function ipMove(e) {
    if (!ipDragging) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    ip.style.left = (cx - ipOffX) + 'px';
    ip.style.top  = (cy - ipOffY) + 'px';
    e.preventDefault();
  }
  function ipEnd() {
    ipDragging = false;
    ip.classList.remove('dragging');
  }

  ip.addEventListener('mousedown',  ipStart);
  ip.addEventListener('touchstart', ipStart, { passive: false });
  document.addEventListener('mousemove', ipMove);
  document.addEventListener('touchmove', ipMove, { passive: false });
  document.addEventListener('mouseup',  ipEnd);
  document.addEventListener('touchend', ipEnd);

  /* ── 车厢场景：每个 IP 可拖动、双击回预设位置、单击（不拖动）开档案窗口 ── */
  function isDesktopScene() {
    return window.matchMedia('(min-width: 601px)').matches;
  }

  const scene = document.getElementById('train-scene');
  document.querySelectorAll('.scene-ip').forEach(function (sip) {
    const anchorLeft = sip.style.left;
    const anchorTop  = sip.style.top;
    let dragging = false, moved = false, startX = 0, startY = 0, offX = 0, offY = 0;

    function start(e) {
      if (!isDesktopScene()) return; // 移动端改为横滑翻页，不支持拖动
      const rect = sip.getBoundingClientRect();
      const sceneRect = scene.getBoundingClientRect();
      sip.style.left = (rect.left - sceneRect.left + rect.width / 2) + 'px';
      sip.style.top  = (rect.top  - sceneRect.top  + rect.height / 2) + 'px';
      dragging = true;
      moved = false;
      sip.classList.add('dragging');
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      startX = cx; startY = cy;
      offX = cx - rect.left;
      offY = cy - rect.top;
      e.preventDefault();
    }
    function move(e) {
      if (!dragging) return;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      if (Math.abs(cx - startX) > 4 || Math.abs(cy - startY) > 4) moved = true;
      const sceneRect = scene.getBoundingClientRect();
      let newLeft = cx - sceneRect.left - offX + sip.offsetWidth  / 2;
      let newTop  = cy - sceneRect.top  - offY + sip.offsetHeight / 2;
      newLeft = Math.max(16, Math.min(sceneRect.width  - 16, newLeft));
      newTop  = Math.max(16, Math.min(sceneRect.height - 16, newTop));
      sip.style.left = newLeft + 'px';
      sip.style.top  = newTop  + 'px';
      e.preventDefault();
    }
    function end() {
      if (!dragging) return;
      dragging = false;
      sip.classList.remove('dragging');
      if (!moved) openCaseWindow(sip.dataset.id);
    }

    sip.addEventListener('mousedown',  start);
    sip.addEventListener('touchstart', start, { passive: false });
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('mouseup',  end);
    document.addEventListener('touchend', end);

    sip.addEventListener('dblclick', function () {
      sip.style.left = anchorLeft;
      sip.style.top  = anchorTop;
    });

    // 移动端：无拖动，单击直接开窗
    sip.addEventListener('click', function () {
      if (!isDesktopScene()) openCaseWindow(sip.dataset.id);
    });
  });

  /* ── 观测信号背景：信号线被逐笔画出 → 尖峰处闪现小星 → 停留 → 淡出 → 换高度换波形重来 ── */
  (function () {
    const layer = document.getElementById('scene-signal');
    const line  = document.getElementById('signal-line');
    if (!layer || !line) return;
    const svg = line.ownerSVGElement;
    const NS = 'http://www.w3.org/2000/svg';
    const SPARK_D = 'M0,-11 Q2,-2 11,0 Q2,2 0,11 Q-2,2 -11,0 Q-2,-2 0,-11 Z';

    // 波形变体：平静段 + 心电式脉冲簇；最后一个是彩蛋——信号收进一颗小爱心后不再继续
    const VARIANTS = [
      { d: 'M0,104 L200,104 L218,66 L236,132 L252,104 L470,104 L484,84 L498,124 L514,44 L530,158 L546,72 L560,120 L574,104 L1200,104',
        sparks: [[310,66,1], [612,58,0.8], [668,142,0.65]] },
      { d: 'M0,104 L150,104 L166,80 L180,126 L194,104 L420,104 L436,60 L452,148 L468,76 L482,118 L496,104 L760,104 L774,88 L788,118 L800,104 L1200,104',
        sparks: [[524,54,0.9], [842,78,0.7], [252,148,0.6]] },
      { d: 'M0,104 L240,104 L256,70 L272,136 L288,104 L520,104 L536,50 L554,156 L570,80 L584,120 L598,104 L820,104 C818,74 840,58 860,64 C874,68 884,80 888,92 C892,80 902,68 916,64 C936,58 958,74 956,104 C954,126 928,146 892,168 L886,172 M978,104 L1200,104',
        sparks: [[646,58,0.9], [1000,72,1], [934,148,0.7]] },
    ];
    // 每轮换个高度出现（%）；手机上避开下方的沙发 IP 和导航区
    const TOPS = window.matchMedia('(max-width: 600px)').matches ? [12, 30, 48] : [16, 40, 66];

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      line.setAttribute('d', VARIANTS[0].d);  // 静态一条淡线，不播绘制
      return;
    }

    let round = 0, lastTop = -1, sparkEls = [];

    function playRound() {
      // 每 4 轮遇到一次爱心彩蛋，其余在前两种波形里交替
      const v = (round % 4 === 3) ? VARIANTS[2] : VARIANTS[round % 2];
      let top;
      do { top = TOPS[Math.floor(Math.random() * TOPS.length)]; } while (top === lastTop);
      lastTop = top;
      round++;

      layer.style.top = top + '%';
      line.setAttribute('d', v.d);
      sparkEls.forEach(function (s) { s.remove(); });
      sparkEls = v.sparks.map(function (sp) {
        const el = document.createElementNS(NS, 'path');
        el.setAttribute('class', 'signal-spark');
        el.setAttribute('d', SPARK_D);
        el.setAttribute('transform', 'translate(' + sp[0] + ',' + sp[1] + ') scale(' + sp[2] + ')');
        svg.appendChild(el);
        return el;
      });

      const len = line.getTotalLength();
      line.style.transition = 'none';
      line.style.strokeDasharray = len;
      line.style.strokeDashoffset = len;
      layer.classList.remove('fade');

      requestAnimationFrame(function () { requestAnimationFrame(function () {
        const drawSec = Math.min(9, Math.max(5, len / 240));  // 笔速：路径越长画得越久
        line.style.transition = 'stroke-dashoffset ' + drawSec + 's linear';
        line.style.strokeDashoffset = '0';
        setTimeout(function () {
          sparkEls.forEach(function (s) { s.classList.add('show'); });
        }, drawSec * 700);  // 画到七成时星星次第亮起
        setTimeout(function () {
          layer.classList.add('fade');
          setTimeout(playRound, 3800);  // 淡出 1.2s + 空档，再起下一条
        }, drawSec * 1000 + 3200);      // 画完停留 3.2s
      }); });
    }

    setTimeout(playRound, 1600);  // 等打字机气泡先开场
  })();

  /* ── 顶部通知条（pudding 式打字机）：逐字打出后常驻，不再消失 ── */
  (function () {
    const notice = document.getElementById('scene-notice');
    const noticeText = document.getElementById('scene-notice-text');
    if (!notice || !noticeText) return;
    const msg = window.matchMedia('(max-width: 600px)').matches
      ? '捕获到 4 条异常信号，\n点击角色查看档案。'
      : '捕获到 4 条异常信号，点击角色查看档案。';
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      noticeText.textContent = msg;
      notice.classList.add('show');
      return;
    }
    setTimeout(function () {
      notice.classList.add('show');
      let i = 0;
      const timer = setInterval(function () {
        i++;
        noticeText.textContent = msg.slice(0, i);
        if (i >= msg.length) clearInterval(timer);
      }, 70);
    }, 700);
  })();

  // 移动端分页：箭头和页码保持同步
  if (scene) {
    const slides = document.querySelectorAll('.scene-ip');
    const pageCount = document.getElementById('scene-page-count');
    let currentPage = 0;

    function clampPage(idx) {
      return Math.max(0, Math.min(slides.length - 1, idx));
    }

    function updatePager(idx) {
      currentPage = clampPage(idx);
      scene.style.setProperty('--scene-page', currentPage);
      slides.forEach(function (slide, i) {
        slide.style.setProperty('--mobile-left', ((i - currentPage) * 100) + '%');
        slide.classList.toggle('active-slide', i === currentPage);
      });
      if (pageCount) pageCount.textContent = (currentPage + 1) + ' / ' + slides.length;
    }

    function goToPage(idx) {
      const next = clampPage(idx);
      updatePager(next);
    }

    if (slides.length) {
      document.querySelectorAll('.scene-page-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          goToPage(currentPage + Number(btn.dataset.dir || 0));
        });
      });

      updatePager(0);
    }
  }

})();
</script>
